# 全球股市投资日报系统 - 配置文件

# ---------------------------------------------------------------------------
# 数据采集配置
# ---------------------------------------------------------------------------
data:
  # A股收盘时间 (北京时间)
  a_share_close_time: "15:30"
  # 美股数据采集时间 (北京时间次日早上)
  us_market_fetch_time: "08:00"

  # 数据源配置
  sources:
    akshare:
      enabled: true
      rate_limit_seconds: 1.0     # API调用间隔(秒)
      cache_ttl_minutes: 10       # 全市场行情缓存时间

    yfinance:
      enabled: false
      rate_limit_seconds: 0.5

  # 全球市场数据：多源回退（Stooq → FRED → AKShare 海外 → yfinance 兜底）
  global_market:
    providers: [stooq, fred, akshare_global, yfinance]
    cache_ttl_hours: 6.0          # 当日缓存有效期（历史日期永不过期）
    stooq:
      enabled: true
      base_url: https://stooq.com
      timeout_seconds: 10.0
      max_concurrency: 4
    fred:
      enabled: true
      api_key_env: FRED_API_KEY   # 在 .env 中设置 FRED_API_KEY
      base_url: https://api.stlouisfed.org
      timeout_seconds: 10.0
    akshare_global:
      enabled: true
      rate_limit_seconds: 1.0
    yfinance:
      enabled: true               # 末位兜底 — 在 stooq/akshare_global 失效时覆盖 ETF/全球指数
      rate_limit_seconds: 0.5

  # 存储配置
  storage:
    type: sqlite
    path: data/fund_advisor.db    # SQLite数据库文件路径

  # 恢恢量化 A 股情绪面增强 (zero-config, 每日 20:00 更新)
  # 提供赚钱效应指数 / 连板天梯 / 热门题材 / 焦点新闻 — 非实时
  # 数据源 hhxg.top 是聚合站,无 SLA;失败时上述字段为空,不影响主流程
  hhxg:
    enabled: true
    base_url: https://hhxg.top/static/data
    timeout_seconds: 15.0

# ---------------------------------------------------------------------------
# 分析引擎配置
# ---------------------------------------------------------------------------
analysis:
  # 趋势跟踪
  trend:
    ma_periods: [5, 20, 60]      # 均线周期(日)
    standing_line_threshold: 0.5  # 站线比例阈值(50%以上=市场偏强)

  # 行业轮动
  rotation:
    momentum_windows: [21, 63, 126]  # 近1月/3月/6月(交易日)

  # 估值判断
  valuation:
    pe_percentile_low: 30        # PE分位低于30%=便宜
    pe_percentile_high: 70       # PE分位高于70%=贵
    bond_yield_comparison: true  # 启用股债性价比

  # 风险监控
  risk:
    anomaly_threshold: 0.03      # 单日涨跌超3%=异常
    max_drawdown_warning: 0.15   # 回撤超15%=预警
    correlation_warning: 0.80    # 持仓相关性>0.8=分散化失效

# ---------------------------------------------------------------------------
# LLM配置
# ---------------------------------------------------------------------------
llm:
  # 日报生成
  report:
    max_length_chars: 800        # 日报最大长度(字符)
    tone: "专业简洁"             # 写作风格

# ---------------------------------------------------------------------------
# 调度配置
# ---------------------------------------------------------------------------
scheduler:
  timezone: Asia/Shanghai

  jobs:
    # 每日盘后完整采集
    daily_collection:
      cron: "0 30 15 * * mon-fri"  # 交易日15:30
      enabled: true

    # 交易时段异常检测
    intraday_monitor:
      interval_minutes: 5
      enabled: true
      start_time: "09:30"
      end_time: "15:00"

# ---------------------------------------------------------------------------
# 消息推送配置
# ---------------------------------------------------------------------------
notify:
  # 企业微信机器人 Webhook
  wechat_work:
    enabled: false
    webhook_url_env: WECHAT_WORK_WEBHOOK_URL

  # 飞书机器人 Webhook
  feishu:
    enabled: false
    webhook_url_env: FEISHU_WEBHOOK_URL

# ---------------------------------------------------------------------------
# 日志配置
# ---------------------------------------------------------------------------
logging:
  level: INFO
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} | {message}"
  rotation: "10 MB"
  retention: "30 days"
